name: Validate Markdown

on:
  pull_request:
    paths:
      - '**.md'
  push:
    branches: [main]
    paths:
      - '**.md'

jobs:
  lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            README.md
            CONTRIBUTING.md
            CHANGELOG.md
            QUICK_REFERENCE.md
            DAY1_SETUP.md
            INDEX.md
            SKILL_FILES/**/*.md
            CHECKLISTS/**/*.md
            MASTER_SYSTEM_PROMPTS/**/*.md
            SAMPLES/**/*.md
          config: .markdownlint.json
        continue-on-error: true

  check-links:
    name: Check internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --include-fragments
            'README.md'
            'QUICK_REFERENCE.md'
            'DAY1_SETUP.md'
            'INDEX.md'
            'SAMPLES/**/*.md'
          fail: false
